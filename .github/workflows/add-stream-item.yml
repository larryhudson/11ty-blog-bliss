name: Add stream item

# Triggered from the Apple Shortcut via the GitHub API (workflow_dispatch).
# Fetches the page title, writes a reading/building post, and opens a draft PR.

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL of the page to add
        required: true
      description:
        description: Short take / description
        required: false
        default: ''
      title:
        description: Title (optional; detected from the page if omitted)
        required: false
        default: ''
      type:
        description: reading or building
        required: false
        default: reading
      shouldPublish:
        description: Publish immediately (merge the PR) instead of opening a draft
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  add-item:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Create stream item
        id: create
        env:
          URL: ${{ inputs.url }}
          DESCRIPTION: ${{ inputs.description }}
          TITLE: ${{ inputs.title }}
          TYPE: ${{ inputs.type }}
          SHOULD_PUBLISH: ${{ inputs.shouldPublish }}
        run: node scripts/new-stream-item.mjs

      - name: Open PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.create.outputs.branch }}
          draft: ${{ steps.create.outputs.publish != 'true' }}
          title: 'Add ${{ inputs.type }}: ${{ steps.create.outputs.title }}'
          commit-message: 'Add ${{ inputs.type }} item: ${{ steps.create.outputs.title }}'
          add-paths: content/posts/**
          body: |
            Auto-created from the Apple Shortcut.

            - URL: ${{ inputs.url }}
            - File: `${{ steps.create.outputs.path }}`

            Edit the wording if you want, then mark it ready and merge.

      - name: Publish (merge) if requested
        if: ${{ steps.create.outputs.publish == 'true' && steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch
